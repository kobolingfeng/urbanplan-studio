name: Verify

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Prepare native dependencies
        run: bun run setup

      - name: Run verification suite
        run: bun run verify

      - name: Run release verification
        run: bun run verify:release

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: urbanplan-studio-release
          path: |
            release/*.zip
            release/SHA256SUMS.txt
